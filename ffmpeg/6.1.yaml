extends: "base"

source:
  method: git
  repo: ffmpeg/ffmpeg
  ref: "n${VERSION}"
  sha512: abb9207364553248278f8e23e3d565da51ecb0ae9b20edda41624b314541bc3f53a8d6aac7fa5455168d2323d5d70d5a8acbe059f33423fbc2563e1a6cd0348b

dep_overrides:
  nvcodec: "ffnvcodec-11"

build:
  base_options: "--enable-pic --disable-doc --enable-runtime-cpudetect --disable-autodetect --enable-debug"
  debug:
    options: "--disable-optimizations"
  release:
    options: "--enable-optimizations"
  host_deps:
    - name: vcpkg-cmake-get-vars
      host: true
    - name: vcpkg-pkgconfig-get-modules
      host: true

patches:
  - 6.x/0001-create-lib-libraries-6.1.patch
  - 6.x/0002-fix-msvc-link.patch
  - 6.x/0003-fix-windowsinclude.patch
  - 6.x/0004-dependencies-6.1.patch
  - 6.x/0005-fix-nasm-6.0.patch
  - 6.x/0007-fix-lib-naming-6.1.patch
  - 6.x/0012-Fix-ssl-110-detection.patch
  - 6.x/0013-define-WINVER.patch
  - 6.x/0020-fix-aarch64-libswscale-6.1.patch
  - 6.x/0040-ffmpeg-add-av_stream_get_first_dts-for-chromium-6.1.patch
  - 6.x/0041-add-const-for-opengl-definition.patch
  - 6.x/0050-lensfun-0.3.4-compat-6.x.patch
  - 6.x/0052-svtav1-3.x-compat-6.x.patch

