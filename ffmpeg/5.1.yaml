extends: "base"

source:
  method: git
  repo: ffmpeg/ffmpeg
  ref: "n${VERSION}"

dep_overrides:
  nvcodec: "ffnvcodec-11"

build:
  base_options: "--enable-pic --disable-doc --enable-runtime-cpudetect --disable-autodetect --enable-debug"
  debug:
    options: "--debug --disable-optimizations"
  release:
    options: "--enable-optimizations"
  host_deps:
    - name: vcpkg-cmake-get-vars
      host: true
    - name: vcpkg-pkgconfig-get-modules
      host: true


patches:
  - 0050-lensfun-0.3.4-compat.patch
