extends: "base"

source:
  method: git
  repo: ffmpeg/ffmpeg
  ref: "n${VERSION}"
  sha512: ad50e308e8a5e59cfe9f5368743f1d6b3304216326fce9b0ed5bdd124373fe5660239a83f5e085d5e01898f6cfe369b08c227239ad549242127276f90c1d1118

dep_overrides:
  nvcodec: "ffnvcodec-11"

build:
  base_options: "--enable-pic --disable-doc --enable-runtime-cpudetect --disable-autodetect --enable-debug"
  debug:
    options: "--debug --disable-optimizations"
  release:
    options: "--enable-optimizations"
  host_deps:
    - name: vcpkg-cmake-get-vars
      host: true
    - name: vcpkg-pkgconfig-get-modules
      host: true


patches:
  - 5.x/0001-create-lib-libraries.patch
  - 5.x/0002-fix-msvc-link.patch
  - 5.x/0003-fix-windowsinclude.patch
  - 5.x/0004-fix-debug-build.patch
  - 5.x/0005-fix-nasm-5.1.patch
  - 5.x/0006-fix-StaticFeatures.patch
  - 5.x/0007-fix-lib-naming.patch
  - 5.x/0009-Fix-fdk-detection.patch
  - 5.x/0011-Fix-x265-detection-5.1.patch
  - 5.x/0012-Fix-ssl-110-detection.patch
  - 5.x/0013-define-WINVER.patch
  - 5.x/0015-Fix-xml2-detection.patch
  - 5.x/0020-fix-aarch64-libswscale.patch
  - 5.x/0022-fix-iconv.patch
  - 5.x/0050-lensfun-0.3.4-compat.patch
  - 5.x/0051-libjxl-0.11-compat.patch
  - 5.x/0052-svtav1-3.x-compat.patch
  - 5.x/0053-fix-libjxl-detection-5.1.patch
