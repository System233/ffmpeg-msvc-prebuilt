extends: "base"

source:
  method: git
  repo: ffmpeg/ffmpeg
  ref: "n${VERSION}"
  sha512: 0e1ba72f57992fb3b38b0d6377182c4730e266bf78b2ac0720febfe000afdce66d6d621d305726a70474c03cf50041e6066a270b87b7ab086c54f7351b713a89

dep_overrides:
  nvcodec: "ffnvcodec-11"
  qsv: "mfx-dispatch"

build:
  base_options: "--enable-pic --disable-doc --enable-runtime-cpudetect --disable-autodetect --enable-debug"
  debug:
    options: "--disable-optimizations"
  release:
    options: "--enable-optimizations"
  host_deps:
    - name: vcpkg-cmake-get-vars
      host: true
    - name: vcpkg-pkgconfig-get-modules
      host: true

features:
  nvcodec:
    flag: "--enable-cuda --enable-nvenc"
  openssl:
    flag: "--enable-openssl"
    depends: ["openssl", "@license-nonfree"]
    description: "Use OpenSSL for TLS support"

patches:
  - 3.x/configure_opencv-3.4.14.patch
  - 3.x/create-lib-libraries.patch
  - 3.x/detect-openssl-3.4.14.patch
  - 3.x/windres-configure-fix-3.4.14.patch
  - 3.x/0006-fix-libmp3lame-static.patch
  - 3.x/0007-fix-msvc-lib-naming.patch
  - 3.x/0008-fix-sdl2-version.patch
  - 3.x/0009-fix-openjpeg-lib-name.patch
  - 3.x/0010-fix-opencl.patch
  - 3.x/0011-fix-opengl-quoting.patch
  - 3.x/0012-fix-opengl-unistd.patch
  - 3.x/0013-fix-x264-imports.patch
  - 3.x/0014-fix-bzlib-debug.patch
