extends: "base"

source:
  method: git
  repo: ffmpeg/ffmpeg
  ref: "n${VERSION}"

dep_overrides:
  nvcodec: "ffnvcodec-11"
  qsv: "mfx-dispatch"

build:
  base_options: "--enable-pic --disable-doc --enable-runtime-cpudetect --disable-autodetect --enable-debug"
  debug:
    options: "--debug --disable-optimizations"
  release:
    options: "--enable-optimizations"
  host_deps:
    - name: vcpkg-cmake-get-vars
      host: true
    - name: vcpkg-pkgconfig-get-modules
      host: true

features:
  include:
    - "@all"
    - nvenc
  exclude:
    - sdl2 # configure Package 'sdl2' has version '2.32.10', required version is '< 2.1.0'
    - openssl # configure
    - opencl # configure
    - openjpeg # configure
    - vulkan #unsupported
    - aom
    - dav1d
    - srt
    - svtav1
    - jxl
    - harfbuzz
    - shaderc
    - vvenc
    - dvdnav
    - dvdread
    - d3d12va
    - amf
    - lensfun #unsupported
    - mediafoundation
    - qsv
  nvcodec:
    flag: "--enable-cuda --enable-nvenc"
  defaults:
    - "@all"
