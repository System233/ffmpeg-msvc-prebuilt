extends: "base"

source:
  method: git
  repo: ffmpeg/ffmpeg
  ref: "n${VERSION}"

dep_overrides:
  nvcodec: "ffnvcodec-11"
  qsv: "mfx-dispatch"

build:
  base_options: "--enable-pic --disable-doc --enable-runtime-cpudetect --disable-autodetect --enable-debug"
  debug:
    options: "--debug --disable-optimizations"
  release:
    options: "--enable-optimizations"
  host_deps:
    - name: vcpkg-cmake-get-vars
      host: true
    - name: vcpkg-pkgconfig-get-modules
      host: true

features:
  include:
    - "@all"
  exclude:
    - jxl
    - vulkan #INTERNAL COMPILER ERROR
    - harfbuzz
    - shaderc
    - vvenc
    - dvdnav
    - dvdread
    - d3d12va
    - qsv
  defaults:
    - "@all"
