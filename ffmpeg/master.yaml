extends: "base"
revision: 0

source:
  method: git
  repo: ffmpeg/ffmpeg
  ref: "${FFMPEG_REF}"
  head_ref: "master"

# BUG
# - microsoft/vcpkg#35694
# - microsoft/vcpkg#46738
# - microsoft/vcpkg#22437
# - microsoft/vcpkg#23772
# - microsoft/vcpkg-tool#295
# - microsoft/vcpkg-tool#538

build:
  base_options: "--enable-pic --disable-doc --enable-runtime-cpudetect --disable-autodetect --enable-debug"
  debug:
    options: "--disable-optimizations"
  release:
    options: "--enable-optimizations"
  host_deps:
    - name: ffmpeg-bin2c
      host: true
    - name: ffmpeg-opstool
      host: true
    - name: vcpkg-cmake-get-vars
      host: true
    - name: vcpkg-pkgconfig-get-modules
      host: true
  cmake_defines:
    FFMPEG_NEED_BIN2C: ON
    FFMPEG_NEED_OPSTOOL: "ON"

patches:
  # - 8.x/0002-fix-msvc-link-8.1.patch
  - 8.x/0003-fix-windowsinclude.patch
  - 8.x/0056-dependencies-master.patch
  # - 8.x/0005-fix-nasm-8.1.patch
  - 8.x/0007-fix-lib-naming-8.1.patch
  - 8.x/0013-define-WINVER-8.1.patch
  - 8.x/0024-fix-osx-host-c11-8.1.patch
  - 8.x/0040-ffmpeg-add-av_stream_get_first_dts-for-chromium.patch
  - 8.x/0045-use-prebuilt-bin2c-8.1.patch
  - 8.x/0046-fix-msvc-detection-8.1.patch
  - 8.x/0047-fix-msvc-utf8.patch
  # - 8.x/0048-backport-23039.patch
  - 8.x/0050-lensfun-0.3.4-compat-8.x.patch
  - 8.x/0051-lensfun-configure-fix-8.x.patch
  - 8.x/0052-fix-msvc-flags-filter-8.2.patch
  - 8.x/0053-fix-host-cc-msvc-8.2.patch
  - 8.x/0054-fix-opstool-aarch64-8.2.patch
