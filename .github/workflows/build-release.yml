# ---------------------------------------------------------------------------
# build-release.yml — Build & release FFmpeg (MSVC prebuilt)
#
# Triggered manually (workflow_dispatch) or called from another workflow
# (workflow_call).  Builds FFmpeg across a matrix of triplets, licenses,
# and linkage types, then publishes all artifacts as a GitHub Release.
#
# SPEC: ci/SPEC.md §7.1
# ---------------------------------------------------------------------------

name: Build FFmpeg Release

concurrency:
  group: ${{ inputs.dry_run && format('dry-run-{0}', github.run_id) || format('release-{0}', inputs.ref || inputs.yaml) }}
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      yaml:
        description: "YAML config name (e.g. 8.1.1, master)"
        required: true
        type: string
      ref:
        description: "Git describe string for snapshot builds (e.g. n8.0-1234-gabc). Omit for tagged releases."
        required: false
        type: string
      target_arch:
        description: "Limit build architecture (e.g. x64-windows)"
        required: false
        type: string
      target_license:
        description: "Limit license type (e.g. gpl)"
        required: false
        type: string
      sha512:
        description: "SHA-512 of the source tarball (optional)"
        required: false
        type: string
      dry_run:
        description: 'Skip release creation and data branch push'
        type: boolean
        default: false
      pr_number:
        description: 'Pull request number (for PR Build failures)'
        type: string
        required: false

  workflow_call:
    inputs:
      yaml:
        type: string
        required: true
      ref:
        type: string
        required: false
      target_arch:
        type: string
        required: false
      target_license:
        type: string
        required: false
      sha512:
        type: string
        required: false
      dry_run:
        type: boolean
        required: false
        default: false
      pr_number:
        type: string
        required: false

# ==─ Global environment ======================================================
env:
  VCPKG_TAG: 2026.06.01
  PYTHONIOENCODING: utf-8
  TRIPLETS: "arm-windows arm64-windows x86-windows x64-windows"
  LICENSES: "lgpl gpl" #nonfree
  LINKAGES: "shared static"
  VCPKG_FORCE_DOWNLOADED_BINARIES: 1
  VCPKG_INSTALL_OPTIONS: --x-abi-tools-use-exact-versions


# ==─ Jobs ====================================================================

jobs:
  # == Scan: check which variants need building, output dynamic matrix ======─
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      matrix: ${{ steps.scan.outputs.matrix }}
      triplets: ${{ steps.scan.outputs.triplets }}
      revision: ${{ steps.rev.outputs.value }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-python
        with:
          requirements: 'requirements.txt'

      - name: Validate ref format
        if: inputs.ref != ''
        run: |
          if ! echo "${{ inputs.ref }}" | grep -qP '^n\d+\.\d+(\.\d+)?(-\w+)*-\d+-g[0-9a-f]+$'; then
            echo "::error::ref must be a git describe string (nX.Y.Z-N-gCOMMIT), got '${{ inputs.ref }}'"
            exit 1
          fi

      - name: Resolve revision
        id: rev
        run: |
          rev=$(python scripts/ffport.py get-revision "${{ inputs.yaml }}")
          echo "value=$rev" >> "$GITHUB_OUTPUT"

      - name: Scan variants and output dynamic build matrix
        id: scan
        env:
          TRIPLETS: ${{ env.TRIPLETS }}
          LICENSES: ${{ env.LICENSES }}
          LINKAGES: ${{ env.LINKAGES }}
        run: |
          ver="${{ inputs.ref || inputs.yaml }}"
          rev="${{ steps.rev.outputs.value }}"
          target_arch="${{ inputs.target_arch }}"
          target_license="${{ inputs.target_license }}"

          FILTER_ARGS=""
          [ -n "$target_arch" ] && FILTER_ARGS="$FILTER_ARGS --target-arch $target_arch"
          [ -n "$target_license" ] && FILTER_ARGS="$FILTER_ARGS --target-license $target_license"

          python scripts/ci/scan_variants.py --ver "$ver" --rev "$rev" $FILTER_ARGS --github-output

  # == DL-Seed: download sources for all triplets ==============================
  # Single job that downloads source archives for every triplet × feature
  # combination via --only-downloads, so builds never need to fetch from the
  # internet (shared download cache for all architectures).
  dl-seed:
    runs-on: windows-2022
    permissions: {}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-python
        with:
          requirements: 'requirements.txt'

      - name: Generate ffmpeg-deps port
        run: |
          python scripts/ffport.py deps

      - name: Compute port hash for download cache
        id: porthash
        run: |
          echo "port_hash=$(python scripts/ci/compute_port_hash.py)" >> "$GITHUB_OUTPUT"

      - name: Quick cache check
        id: dl-check
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/vcpkg/downloads
          key: vcpkg-dl-all-${{ env.VCPKG_TAG }}-${{ steps.porthash.outputs.port_hash }}
          lookup-only: true

      - uses: ./.github/actions/vcpkg-bootstrap
        with:
          tag: ${{ env.VCPKG_TAG }}
          vcpkg-root: ${{ runner.temp }}/vcpkg

      - name: Restore vcpkg downloads cache (all triplets)
        if: steps.dl-check.outputs.cache-hit != 'true'
        id: dl-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/vcpkg/downloads
          key: vcpkg-dl-all-${{ env.VCPKG_TAG }}-${{ steps.porthash.outputs.port_hash }}
          restore-keys: |
            vcpkg-dl-all-${{ env.VCPKG_TAG }}-

      - name: Download sources for all triplets
        if: steps.dl-check.outputs.cache-hit != 'true' && steps.dl-cache.outputs.cache-hit != 'true'
        env:
          VCPKG_ROOT: ${{ runner.temp }}/vcpkg
          VCPKG_OVERLAY_PORTS: ports
          VCPKG_OVERLAY_TRIPLETS: triplets
        shell: pwsh
        run: |
          $env:TRIPLETS = "${{ env.TRIPLETS }}"
          $env:VCPKG_INSTALL_OPTIONS = "${{ env.VCPKG_INSTALL_OPTIONS }}"
          & "${{ github.workspace }}/scripts/ci/dl_seed.ps1"

      - name: Save vcpkg downloads cache
        if: steps.dl-check.outputs.cache-hit != 'true' && steps.dl-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/vcpkg/downloads
          key: vcpkg-dl-all-${{ env.VCPKG_TAG }}-${{ steps.porthash.outputs.port_hash }}

      - name: Upload build logs (dl-seed)
        if: failure() && steps.dl-check.outputs.cache-hit != 'true'
        uses: actions/upload-artifact@v6
        with:
          name: build-logs-dl-seed
          path: |
            ${{ runner.temp }}/vcpkg/buildtrees/*/*.log
            ${{ runner.temp }}/vcpkg/buildtrees/*/*.err
            ${{ runner.temp }}/vcpkg/buildtrees/*/*.txt
          compression-level: 9
          retention-days: 7

  # == Seed: build base dependencies once per triplet ========================─
  # Always builds (no skip).  Fuzzy cache restore → vcpkg ABI check →
  # compute ABI hash → save with exact key for deterministic retrieval.
  seed:
    needs: [dl-seed, scan]
    runs-on: windows-2022
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        triplet: ${{ fromJSON(needs.scan.outputs.triplets) }}
    steps:
      - uses: actions/checkout@v6

      - uses: ./.github/actions/setup-python
        with:
          requirements: 'requirements.txt'

      - name: Generate ffmpeg-deps port
        run: |
          python scripts/ffport.py deps

      - uses: ./.github/actions/vcpkg-restore-caches
        with:
          vcpkg-tag: ${{ env.VCPKG_TAG }}
          vcpkg-root: ${{ runner.temp }}/vcpkg
          cache-path: ${{ runner.temp }}/vcpkg-cache
          triplet: ${{ matrix.triplet }}
          fail-on-miss-root: 'true'

      - name: Patch vcvarsall.bat for ARM Windows SDK
        if: matrix.triplet == 'arm-windows'
        run: |
          $patched = $false
          $vsPaths = & vswhere -all -legacy -property installationPath
          foreach ($vsPath in $vsPaths) {
            $vcvarsall = Join-Path $vsPath "VC\Auxiliary\Build\vcvarsall.bat"
            Write-Output "Patching $vcvarsall"
            $content = Get-Content $vcvarsall -Raw -Encoding Ascii
            $content = $content -replace '(set\s+__VCVARSALL_WINSDK\s*=)\S*', '${1}10.0.22621.0'
            Set-Content $vcvarsall -Value $content -Encoding Ascii -NoNewline
            $patched = $true
          }
          if (-not $patched) {
            throw "Failed to find vcvarsall.bat via vswhere — ARM patch not applied, build cannot proceed"
          }

      - name: Install ffmpeg-deps (all features) + merge ABI hashes
        id: abi-hash
        env:
          VCPKG_BINARY_SOURCES: "clear;files,${{ runner.temp }}/vcpkg-cache,readwrite"
          VCPKG_OVERLAY_PORTS: ports
          VCPKG_OVERLAY_TRIPLETS: triplets
        run: |
          $hashes = @()
          $json = Get-Content ports/ffmpeg-deps/vcpkg.json -Raw | ConvertFrom-Json
          if ($json.features) {
            foreach ($f in $json.features.PSObject.Properties.Name) {
              & "${{ runner.temp }}/vcpkg/vcpkg.exe" install "ffmpeg-deps[$f]" `
                --triplet=${{ matrix.triplet }} `
                --recurse `
                --x-install-root=${{ runner.temp }}/vcpkg_installed `
                ${{ env.VCPKG_INSTALL_OPTIONS }}
              $abiFile = "${{ runner.temp }}/vcpkg_installed/${{ matrix.triplet }}/share/ffmpeg-deps/vcpkg_abi_info.txt"
              Write-Output "=== ABI info for ffmpeg-deps[$f] (${{ matrix.triplet }}) ==="
              Get-Content $abiFile | ForEach-Object { Write-Output $_ }
              Write-Output "=== END ABI info ==="
              $content = Get-Content $abiFile -Raw
              $bytes = [System.Text.Encoding]::UTF8.GetBytes($content)
              $h = [System.BitConverter]::ToString(
                [System.Security.Cryptography.SHA256]::HashData($bytes)
              ) -replace '-', ''
              $hashes += $h
              $null = New-Item -ItemType Directory -Force "${{ runner.temp }}/abi-logs"
              Copy-Item $abiFile "${{ runner.temp }}/abi-logs/ffmpeg-deps-$f.txt"
              Remove-Item -Recurse -Force "${{ runner.temp }}/vcpkg_installed"
            }
          }
          $hashes = $hashes | Sort-Object -Unique
          Write-Output "=== Merged ABI hashes (${{ matrix.triplet }}) ==="
          $hashes | ForEach-Object { Write-Output $_ }
          Write-Output "---"
          $bytes = [System.Text.Encoding]::UTF8.GetBytes(($hashes -join '|'))
          $merged = [System.BitConverter]::ToString(
            [System.Security.Cryptography.SHA256]::HashData($bytes)
          ) -replace '-', ''
          Write-Output "Merged: $merged"
          Write-Output "=== END ==="
          Add-Content -Path $env:GITHUB_OUTPUT -Value "value=$merged"

      - name: Check if exact binary cache already exists
        id: bin-save-check
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-seed-${{ env.VCPKG_TAG }}-${{ matrix.triplet }}-${{ steps.abi-hash.outputs.value }}
          lookup-only: true

      - name: Save binary cache with exact ABI key
        if: steps.bin-save-check.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/vcpkg-cache
          key: vcpkg-seed-${{ env.VCPKG_TAG }}-${{ matrix.triplet }}-${{ steps.abi-hash.outputs.value }}

      - name: Upload build logs (seed)
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-logs-seed-${{ matrix.triplet }}
          path: |
            ${{ runner.temp }}/vcpkg/buildtrees/*/*.log
            ${{ runner.temp }}/vcpkg/buildtrees/*/*.err
            ${{ runner.temp }}/vcpkg/buildtrees/*/*.txt
          compression-level: 9
          retention-days: 7

  # == Build: compile FFmpeg for triplets × licenses × linkages ==============
  # Matrix is dynamically populated by the scan job — only unbuilt variants.
  build:
    needs: [seed, scan]
    if: needs.scan.outputs.matrix != '[]'
    runs-on: windows-2022
    permissions: {}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJSON(needs.scan.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      # == Setup steps ====================================================─
      - uses: ./.github/actions/setup-python
        with:
          requirements: 'requirements.txt'

      - name: Resolve variant metadata
        id: vars
        run: |
          $ver = "${{ inputs.ref || inputs.yaml }}"
          $rev = "${{ needs.scan.outputs.revision }}"
          $triplet = "${{ matrix.triplet }}"
          $license = "${{ matrix.license }}"
          $linkage = "${{ matrix.linkage }}"

          $variant_id = & python scripts/ops/naming.py variant-id `
            --version $ver --revision $rev `
            --triplet $triplet --linkage $linkage --license $license

          $port_name = "ffmpeg"

          echo "linkage_name=$linkage" >> $env:GITHUB_OUTPUT
          echo "variant_id=$variant_id" >> $env:GITHUB_OUTPUT
          echo "port_name=$port_name" >> $env:GITHUB_OUTPUT

      - uses: ./.github/actions/vcpkg-restore-caches
        with:
          vcpkg-tag: ${{ env.VCPKG_TAG }}
          vcpkg-root: ${{ runner.temp }}/vcpkg
          cache-path: ${{ runner.temp }}/vcpkg-cache
          triplet: ${{ matrix.triplet }}
          fail-on-miss-root: 'true'
          fail-on-miss-downloads: 'true'
          fail-on-miss-binary: 'true'

      - name: Patch vcvarsall.bat for ARM Windows SDK
        if: matrix.triplet == 'arm-windows'
        run: |
          $patched = $false
          $vsPaths = & vswhere -all -legacy -property installationPath
          foreach ($vsPath in $vsPaths) {
            $vcvarsall = Join-Path $vsPath "VC\Auxiliary\Build\vcvarsall.bat"
            Write-Output "Patching $vcvarsall"
            $content = Get-Content $vcvarsall -Raw -Encoding Ascii
            $content = $content -replace '(set\s+__VCVARSALL_WINSDK\s*=)\S*', '${1}10.0.22621.0'
            Set-Content $vcvarsall -Value $content -Encoding Ascii -NoNewline
            $patched = $true
          }
          if (-not $patched) {
            throw "Failed to find vcvarsall.bat via vswhere — ARM patch not applied, build cannot proceed"
          }

      # == Generate vcpkg port files ================================─
      - name: Generate port files
        run: |
          $args = @("scripts/ffport.py", "generate", "${{ inputs.yaml }}")
          if ("${{ inputs.ref }}") { $args += "--ref"; $args += "${{ inputs.ref }}" }
          if ("${{ inputs.sha512 }}") { $args += "--sha512"; $args += "${{ inputs.sha512 }}" }
          & python $args

      # == Build FFmpeg via vcpkg ====================================
      - name: Build FFmpeg
        env:
          VCPKG_BINARY_SOURCES: "clear;files,${{ runner.temp }}/vcpkg-cache,read"
          VCPKG_OVERLAY_PORTS: ports
          VCPKG_OVERLAY_TRIPLETS: triplets
        run: |
          $port = "ffmpeg"
          $features = "all-${{ matrix.license }}"
          if ("${{ matrix.linkage }}" -eq "static") {
            $features = "$features,static"
          }
          & "${{ runner.temp }}/vcpkg/vcpkg.exe" install "${port}[${features}]" ffmpeg-tester `
            --triplet=${{ matrix.triplet }} `
            --recurse `
            ${{ env.VCPKG_INSTALL_OPTIONS }}

      # == Package release archive + generate variant YAML ==========─
      - name: Package release archive
        run: |
          $vcpkg_root = "${{ runner.temp }}/vcpkg"
          $port = "${{ steps.vars.outputs.port_name }}"
          $triplet = "${{ matrix.triplet }}"
          $license = "${{ matrix.license }}"

          $pkgArgs = @(
            "--port-dir", "${vcpkg_root}/packages/${port}_${triplet}",
            "--license", $license
          )
          if ("${{ inputs.ref }}") {
            $pkgArgs += "--ref"; $pkgArgs += "${{ inputs.ref }}"
          }
          & python scripts/package_release.py @pkgArgs

      # == Upload artifacts ==========================================
      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ steps.vars.outputs.variant_id }}
          path: |
            Release/*.zip
            Release/*.var.yaml
          compression-level: 0
          retention-days: 5

      # == Upload build logs for debugging ==========================
      # Always runs, even if Step 4 fails, so logs are available for triage.
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: build-logs-${{ matrix.triplet }}-${{ matrix.license }}-${{ matrix.linkage }}
          path: |
            ${{ runner.temp }}/vcpkg/buildtrees/*/*.log
            ${{ runner.temp }}/vcpkg/buildtrees/*/*.err
            ${{ runner.temp }}/vcpkg/buildtrees/*/*.txt
          compression-level: 9
          retention-days: 7

  # == Finalize: merge variants into data branch, create/update release ======
  finalize:
    needs: build
    if: success() || failure()
    concurrency:
      group: data-branch
      cancel-in-progress: false
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Dry run notice
        if: inputs.dry_run == true
        run: |
          echo "::notice::DRY RUN: Release creation and data branch push will be skipped."

      # Checkout main branch so we have access to scripts/
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            scripts/
            requirements.txt

      - uses: ./.github/actions/setup-python
        with:
          requirements: 'requirements.txt'

      # Checkout data branch
      - name: Checkout data branch
        id: checkout-data
        uses: actions/checkout@v6
        with:
          ref: data
          path: data
          fetch-depth: 0
        continue-on-error: true

      - name: Ensure data branch working directory
        id: ensure-data
        run: |
          if [ -d data/.git ]; then
            echo "status=ok" >> "$GITHUB_OUTPUT"
          else
            echo "Data branch checkout failed — creating fresh directory"
            mkdir -p data
            git -C data init
            git -C data remote add origin \
              "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}"
            echo "status=created" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Download all build artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: ffmpeg-*
          path: ${{ github.workspace }}/artifacts/
          merge-multiple: true

      - name: List downloaded artifacts
        run: |
          echo "=== Artifacts ==="
          ls -la ${{ github.workspace }}/artifacts/ 2>/dev/null || echo "(empty)"
          echo "=== Var YAMLs ==="
          ls ${{ github.workspace }}/artifacts/*.var.yaml 2>/dev/null || echo "(none)"
          echo "=== Zips ==="
          ls ${{ github.workspace }}/artifacts/*.zip 2>/dev/null || echo "(none)"
        shell: bash

      - name: Import variant YAMLs (auto-merges into version.yaml)
        env:
          TOTAL_VARIANTS: 24
        run: |
          for f in artifacts/*.var.yaml; do
            [ -f "$f" ] || continue
            python scripts/ops/db.py import "$f" || echo "  WARNING: import failed for $f"
          done
        shell: bash

      - name: Commit and push data branch
        if: inputs.dry_run != true
        run: |
          python scripts/ci/push_data_branch.py \
            --message "Build artifacts for ${{ inputs.ref || inputs.yaml }}" \
            --directory data

      - name: Determine release tag
        id: release_tag
        run: |
          tag=$(python scripts/ci/manage_release.py tag --artifacts-dir "${{ github.workspace }}/artifacts")
          if [ -z "$tag" ]; then
            echo "No artifacts — nothing to release" >&2
            echo "tag=" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or append GitHub Release
        if: inputs.dry_run != true && steps.release_tag.outputs.tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ARGS="--tag ${{ steps.release_tag.outputs.tag }} --artifacts-dir ${{ github.workspace }}/artifacts --yaml ${{ inputs.yaml }}"
          [ -n "${{ inputs.ref }}" ] && ARGS="$ARGS --ref ${{ inputs.ref }}"
          python scripts/ci/manage_release.py create $ARGS


  all-checks-passed:
      name: all-checks-passed
      runs-on: ubuntu-latest
      needs: build
      if: always()
      steps:
        - name: Check Matrix Status
          run: |
            if [ "${{ needs.build.result }}" != "success" ]; then
              echo "Matrix builds failed!"
              exit 1
            else
              echo "All Matrix builds passed successfully!"
            fi

  # == Trigger pages rebuild ================================================─
  trigger-pages:
    needs: finalize
    if: ${{ success() && !inputs.dry_run }}
    uses: ./.github/workflows/pages.yml

  # == Auto-heal: diagnose and create fix PR on build failure ==============─
  trigger-auto-heal:
    needs: build
    if: ${{ always() && needs.build.result == 'failure' && (!inputs.dry_run || inputs.pr_number != '') }}
    uses: ./.github/workflows/auto-heal.yml
    with:
      ref: ${{ inputs.ref }}
      yaml: ${{ inputs.yaml }}
      run_id: ${{ github.run_id }}
      pr_number: ${{ inputs.pr_number }}
    secrets: inherit
