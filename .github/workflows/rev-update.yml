# ---------------------------------------------------------------------------
# rev-update.yml — Detect YAML revision changes and trigger builds
#
# Triggered by:
#   - Push to main with changes to ffmpeg/*.yaml
#   - Pull request merged (closed + merged) with changes to ffmpeg/*.yaml
#
# Runs ci_detect_changes.py to diff before/after SHAs, outputs a JSON
# matrix, and dispatches build-release.yml for each changed version
# via strategy.matrix + uses.
#
# SPEC: ci/SPEC.md §7.3
# ---------------------------------------------------------------------------

name: Detect YAML revision changes

on:
  push:
    branches:
      - main
    paths:
      - 'ffmpeg/*.yaml'
  pull_request:
    types:
      - closed
    branches:
      - main
    paths:
      - 'ffmpeg/*.yaml'

jobs:
  detect:
    if: >
      github.event_name == 'push' ||
      (github.event_name == 'pull_request' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - name: Checkout repository with full history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      - name: Detect changed versions
        id: detect
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.event.after }}"
          else
            BEFORE="${{ github.event.pull_request.base.sha }}"
            AFTER="${{ github.event.pull_request.head.sha }}"
          fi

          echo "Before SHA: ${BEFORE}"
          echo "After SHA:  ${AFTER}"

          python scripts/ops/ci_detect_changes.py \
            --base "$BEFORE" --head "$AFTER" --json > changes.json
          cat changes.json

      - name: Build dispatch matrix
        id: set-matrix
        run: |
          include=$(jq -c '
            if .found then
              [.changed[] | {version, revision}]
            else
              []
            end
          ' changes.json)
          echo "matrix=$include" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    strategy:
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.matrix) }}
    uses: ./.github/workflows/build-release.yml
    with:
      version: ${{ matrix.version }}
      revision: ${{ matrix.revision }}
    secrets: inherit
