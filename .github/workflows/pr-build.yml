# ---------------------------------------------------------------------------
# pr-build.yml — Verify builds on pull requests
#
# Triggered when a PR is opened or updated with changes to YAML specs, ports,
# or patches.  Builds the affected versions with dry_run=true so no GitHub
# Release or data-branch push occurs.
# ---------------------------------------------------------------------------

name: PR Build

concurrency:
  group: pr-build-${{ github.event.pull_request.number }}
  cancel-in-progress: true

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - 'ffmpeg/*.yaml'
      - 'ports/**'
      - 'patches/**'

jobs:
  detect:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      pr_number: ${{ steps.fork.outputs.pr_number }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Check no existing patches modified
        run: |
          MODIFIED=$(git diff --name-only --diff-filter=M \
            "${{ github.event.pull_request.base.sha }}".."${{ github.event.pull_request.head.sha }}" \
            -- patches/)
          if [ -n "$MODIFIED" ]; then
            echo "::error::Modifying existing patches breaks compatibility with older versions. Only add new patches or remove them from YAML."
            echo "$MODIFIED"
            exit 1
          fi

      - name: Detect fork PR
        id: fork
        run: |
          if [ "${{ github.event.pull_request.head.repo.fork }}" = "true" ]; then
            echo "pr_number=" >> $GITHUB_OUTPUT
            echo "Fork PR — auto-heal will be skipped"
          else
            echo "pr_number=${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Detect changed versions
        id: detect
        run: |
          BEFORE="${{ github.event.pull_request.base.sha }}"
          AFTER="${{ github.event.pull_request.head.sha }}"
          echo "Base SHA: ${BEFORE}"
          echo "Head SHA: ${AFTER}"
          python scripts/ops/ci_detect_changes.py \
            --base "$BEFORE" --head "$AFTER" --json > changes.json
          cat changes.json

      - name: Build dispatch matrix
        id: set-matrix
        run: |
          include=$(jq -c '
            if .found then
              [.changed[] | {version, revision}]
            else
              []
            end
          ' changes.json)
          echo "matrix=$include" >> "$GITHUB_OUTPUT"

  build:
    needs: detect
    if: needs.detect.outputs.matrix != '[]'
    strategy:
      matrix:
        include: ${{ fromJSON(needs.detect.outputs.matrix) }}
    uses: ./.github/workflows/build-release.yml
    with:
      yaml: ${{ matrix.version }}
      dry_run: true
      pr_number: ${{ needs.detect.outputs.pr_number }}
    secrets: inherit

  all-checks-passed:
      name: all-checks-passed
      runs-on: ubuntu-latest
      needs: build
      if: always()
      steps:
        - name: Check Matrix Status
          run: |
            if [ "${{ needs.build.result }}" != "success" ]; then
              echo "Matrix builds failed!"
              exit 1
            else
              echo "All Matrix builds passed successfully!"
            fi
