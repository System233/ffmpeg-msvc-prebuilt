# ---------------------------------------------------------------------------
# scan-updates.yml — Scan for new FFmpeg upstream releases and create PRs
#
# Runs daily at 06:00 UTC.  Queries the FFmpeg GitHub tags API, detects new
# versions, creates YAML configs from the closest existing version, generates
# port files, and opens a PR on a ci/ffmpeg-{version} branch.
#
# See ci/SPEC.md §7.2 for the full specification.
# ---------------------------------------------------------------------------

name: Scan for new FFmpeg releases

on:
  schedule:
    - cron: "0 6 * * *"          # Daily at 06:00 UTC
  workflow_dispatch:              # Manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyyaml

      # ── Detect new upstream versions ──────────────────────────────────
      - name: Scan for new upstream releases
        id: scan
        run: |
          python scripts/scan_updates.py 2>&1 | tee scan_output.txt

          # Try JSON output first (future-proof for scan_updates.py upgrade)
          if python -c "
          import json, sys
          with open('scan_output.txt') as f:
              data = json.load(f)
          versions = data.get('new_versions', [])
          for v in versions:
              print(v)
          " 2>/dev/null; then
            : # JSON parsing succeeded
          else
            # Fallback: grep for [NEW] lines and extract version
            grep '\[NEW\]' scan_output.txt \
              | sed 's/.*[[:space:]]\([0-9]\+\.[0-9]\+\(\.[0-9]\+\)*\)[[:space:]].*/\1/'
          fi > new_versions.txt

          count=$(wc -l < new_versions.txt)
          echo "Detected ${count} new version(s)"
          cat new_versions.txt

      # ── Create PRs for each new version ──────────────────────────────
      - name: Create PRs for new versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -s new_versions.txt ]; then
            echo "No new versions to process."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          while IFS= read -r version; do
            [ -z "$version" ] && continue
            echo ""
            echo "=== Processing version: ${version} ==="

            # ── a. Check if YAML already exists ────────────────────────
            if [ -f "ffmpeg/${version}.yaml" ]; then
              echo "  SKIP: ffmpeg/${version}.yaml already exists"
              continue
            fi

            # ── b. Find closest existing YAML (inline bash logic) ──────
            major="${version%%.*}"
            CLOSEST=""

            # First pass: same major version
            for f in ffmpeg/*.yaml; do
              stem=$(basename "$f" .yaml)
              [ "$stem" = "base" ] && continue
              first_part="${stem%%.*}"
              if [ "$first_part" = "$major" ]; then
                if [ -z "$CLOSEST" ] || [ "$stem" \> "$CLOSEST" ]; then
                  CLOSEST="$stem"
                fi
              fi
            done

            # Second pass: no same-major YAML — use global latest
            if [ -z "$CLOSEST" ]; then
              for f in ffmpeg/*.yaml; do
                stem=$(basename "$f" .yaml)
                [ "$stem" = "base" ] && continue
                if [ -z "$CLOSEST" ] || [ "$stem" \> "$CLOSEST" ]; then
                  CLOSEST="$stem"
                fi
              done
            fi

            if [ -z "$CLOSEST" ]; then
              echo "  ERROR: no existing YAML found to use as template — skipping"
              continue
            fi
            echo "  Closest YAML: ${CLOSEST}.yaml"

            # ── c. Copy YAML and set revision: 0 ────────────────────────
            cp "ffmpeg/${CLOSEST}.yaml" "ffmpeg/${version}.yaml"
            if grep -q '^revision:' "ffmpeg/${version}.yaml"; then
              sed -i 's/^revision:.*/revision: 0/' "ffmpeg/${version}.yaml"
            else
              # Add revision: 0 after the extends line
              sed -i '/^extends:/arevision: 0' "ffmpeg/${version}.yaml"
            fi
            echo "  YAML copied with revision: 0"

            # ── d. Generate port files ──────────────────────────────────
            python scripts/generate.py --version "$version" --force
            echo "  Port files generated"

            # ── e. Create PR branch name ────────────────────────────────
            BRANCH="ci/ffmpeg-${version}"

            # ── f. Check if branch already exists on remote ────────────
            if git ls-remote --heads origin "$BRANCH" 2>/dev/null | grep -q "$BRANCH"; then
              echo "  SKIP: branch ${BRANCH} already exists on remote"
              continue
            fi

            # ── g. Commit, push, and create PR ─────────────────────────
            PORT_NAME="ffmpeg-$(echo "$version" | tr '.' '-')"
            git checkout -b "$BRANCH"
            git add "ffmpeg/${version}.yaml" "ports/${PORT_NAME}/"
            git commit -m "feat: add ffmpeg ${version}"

            git push origin "$BRANCH"
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "ffmpeg ${version}" \
              --body "Auto-generated port for FFmpeg ${version}. Please review and merge."

            # Return to main for next iteration
            git checkout main

          done < new_versions.txt

      # ── Summary (always runs) ────────────────────────────────────────
      - name: Summary
        if: always()
        run: |
          echo "=== Scan Updates Summary ==="
          if [ -f new_versions.txt ] && [ -s new_versions.txt ]; then
            echo "New versions detected:"
            cat new_versions.txt
          else
            echo "No new versions detected."
          fi
