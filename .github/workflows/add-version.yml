# ---------------------------------------------------------------------------
# add-version.yml — Manually add a new FFmpeg version and create a PR
#
# Workflow dispatch only.  Verifies the upstream tag exists, then creates
# a ci/ffmpeg-{version} branch with the new YAML and opens an auto-merge PR.
# ---------------------------------------------------------------------------

name: Add FFmpeg Version

on:
  workflow_dispatch:
    inputs:
      version:
        description: "FFmpeg version to add (e.g. 7.1.3, 8.2.1)"
        required: true
        type: string
      sha512:
        description: "SHA-512 of upstream tarball (optional, auto-computed)"
        required: false
        type: string

permissions:
  contents: write

jobs:
  add-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^[0-9]+\.[0-9]+(\.[0-9]+)?$'; then
            echo "::error::Invalid version format. Expected X.Y or X.Y.Z (e.g. 8.2.1)"
            exit 1
          fi

      - name: Check not already exists
        run: |
          if [ -f "ffmpeg/${{ inputs.version }}.yaml" ]; then
            echo "::error::ffmpeg/${{ inputs.version }}.yaml already exists"
            exit 1
          fi

      - name: Verify upstream tag exists
        run: |
          TAG="n${{ inputs.version }}"
          if ! git ls-remote --tags https://github.com/FFmpeg/FFmpeg.git \
               "refs/tags/${TAG}" | grep -q .; then
            echo "::error::Tag ${TAG} not found in upstream FFmpeg repository"
            exit 1
          fi
          echo "Upstream tag ${TAG} verified"

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: ${{ secrets.CI_BOT_CLIENT_ID }}
          private-key: ${{ secrets.CI_BOT_PRIVATE_KEY }}
          permission-contents: write
          permission-pull-requests: write

      - name: Get bot user ID
        id: bot-user
        run: |
          ID=$(gh api /users/ffmpeg-dev[bot] --jq .id)
          echo "user-id=$ID" >> $GITHUB_OUTPUT
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Create version branch and PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git remote set-url origin \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}"
          git config user.name "ffmpeg-dev[bot]"
          git config user.email "${{ steps.bot-user.outputs.user-id }}+ffmpeg-dev[bot]@users.noreply.github.com"

          CLOSEST=$(python scripts/find_closest_yaml.py --version "${{ inputs.version }}")
          echo "Closest YAML: ${CLOSEST}"

          SHA512_ARGS=""
          [ -n "${{ inputs.sha512 }}" ] && SHA512_ARGS="--sha512 ${{ inputs.sha512 }}"

          python scripts/ops/create_version_pr.py \
            --version "${{ inputs.version }}" \
            --closest-yaml "$CLOSEST" \
            $SHA512_ARGS
